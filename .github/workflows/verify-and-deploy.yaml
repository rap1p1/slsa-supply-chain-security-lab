# ============================================================================
# Continuous Deployment: Verify & Deploy to k3s
# ============================================================================
# Triggers after supply-chain-security workflow completes.
# Verifies all artifacts before deploying to the cluster.
# ============================================================================

name: Verify & Deploy

on:
  workflow_run:
    workflows: ["Supply Chain Security Pipeline"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      image_digest:
        description: 'Image digest to deploy (sha256:...)'
        required: true
        type: string

permissions:
  contents: write    # Update K8s manifests with new digest
  packages: read     # Read from GHCR
  id-token: write    # OIDC for verification

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: rap1p1/secure-payment-platform

jobs:
  verify-and-deploy:
    name: "🚀 Verify & Deploy"
    runs-on: ubuntu-latest
    # Only deploy if the supply-chain-security workflow succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: "📥 Checkout code"
        uses: actions/checkout@v4

      - name: "🔧 Install tools"
        uses: sigstore/cosign-installer@v3.7.0

      - name: "🔐 Login to GHCR"
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ------------------------------------------------------------------
      # Get the latest image digest (from the triggering workflow)
      # ------------------------------------------------------------------
      - name: "🔍 Get latest image digest"
        id: get-digest
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            DIGEST="${{ inputs.image_digest }}"
          else
            # Pull the image to resolve the tag to the correct manifest digest
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            # Get the manifest digest using docker inspect
            DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest | cut -d'@' -f2)
          fi
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "📦 Image digest: ${DIGEST}"

      # ------------------------------------------------------------------
      # Pre-deployment verification gate
      # ALL checks must pass before deployment proceeds
      # ------------------------------------------------------------------
      - name: "🔒 Pre-deployment security gate"
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.get-digest.outputs.digest }}"
          echo "🔒 Running pre-deployment security verification..."
          echo "   Image: ${IMAGE}"
          echo ""
          
          # Check 1: Image signature
          echo "--- Check 1/3: Image Signature ---"
          cosign verify "${IMAGE}" \
            --certificate-identity-regexp="github.com/rap1p1/secure-payment-platform" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            > /dev/null 2>&1
          echo "✅ Image signature: VALID"
          
          # Check 2: SBOM attestation
          echo "--- Check 2/3: SBOM Attestation ---"
          cosign verify-attestation \
            --type cyclonedx "${IMAGE}" \
            --certificate-identity-regexp="github.com/rap1p1/secure-payment-platform" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            > /dev/null 2>&1
          echo "✅ SBOM attestation: VALID"
          
          # Check 3: SLSA provenance
          echo "--- Check 3/3: SLSA Provenance ---"
          cosign verify-attestation \
            --type slsaprovenance "${IMAGE}" \
            --certificate-identity-regexp="github.com/slsa-framework" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            > /dev/null 2>&1
          echo "✅ SLSA provenance: VALID"
          
          echo ""
          echo "🛡️ All 3/3 security checks PASSED. Proceeding to deploy."

      # ------------------------------------------------------------------
      # Update K8s manifests with the verified digest
      # ArgoCD will auto-sync this change to the cluster
      # ------------------------------------------------------------------
      - name: "📝 Update deployment manifest with verified digest"
        run: |
          DIGEST="${{ steps.get-digest.outputs.digest }}"
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${DIGEST}"
          
          # Update the deployment.yaml with the new digest
          sed -i "s|image: ghcr.io/rap1p1/secure-payment-platform@sha256:.*|image: ${IMAGE}|g" \
            k8s/base/deployment.yaml
          
          echo "📝 Updated deployment to: ${IMAGE}"

      - name: "📤 Commit updated manifests"
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          if git diff --quiet; then
            echo "ℹ️ No changes to commit"
          else
            git add k8s/base/deployment.yaml
            git commit -m "chore: update deployment image to ${{ steps.get-digest.outputs.digest }}

          Automated by Supply Chain Security Pipeline.
          All security checks passed:
          - ✅ Image signature verified
          - ✅ SBOM attestation verified
          - ✅ SLSA L3 provenance verified"
            
            git push
            echo "✅ Manifests updated and pushed. ArgoCD will auto-sync."
          fi
